[project]

site_name = "ASTRA"
site_description = "ASTRA — Agentic Schema for Transparent Research Analysis."
site_author = "Lightcone Research"
site_url = "https://astra-spec.org"
copyright = "&copy; 2026 Lightcone Research"

repo_url = "https://github.com/LightconeResearch/astra-spec"
repo_name = "LightconeResearch/astra-spec"

nav = [
  { "Specification" = "index.md" },
  { "Schema Reference" = "elements/index.md" },
  { "About" = "about.md" },
]

[project.theme]

variant = "modern"

features = [
  "announce.dismiss",
  "content.code.annotate",
  "content.code.copy",
  "content.code.select",
  "content.tabs.link",
  "content.tooltips",
  "navigation.footer",
  "navigation.indexes",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.instant.progress",
  "navigation.path",
  "navigation.sections",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
  "search.suggest",
]

[project.theme.icon]
logo = "lucide/book-open"

# Light/dark palettes with a manual toggle.
[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"
