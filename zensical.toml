[project]

site_name = "ASTRA"
site_description = "ASTRA — Agentic Schema for Transparent Research Analysis."
site_author = "Lightcone Research"
site_url = "https://astra-spec.org"
copyright = "&copy; 2026 ASTRA Contributors"

repo_url = "https://github.com/LightconeResearch/astra-spec"
repo_name = "LightconeResearch/astra-spec"

nav = [
  { "Documentation" = [
      { "Home" = "index.md" },
      { "Getting started" = "getting-started.md" },
      { "CLI reference" = "cli.md" },
      { "About" = "about.md" },
  ] },
  { "Specification" = [
      { "Format reference" = "specification.md" },
      { "Schema reference" = "elements/index.md" },
  ] },
  { "Community" = "community.md" },
]

[project.theme]

variant = "modern"
favicon = "assets/favicon.svg"

features = [
  "announce.dismiss",
  "content.code.annotate",
  "content.code.copy",
  "content.code.select",
  "content.tabs.link",
  "content.tooltips",
  "navigation.footer",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.instant.progress",
  "navigation.path",
  "navigation.sections",
  "navigation.tabs",
  "navigation.tabs.sticky",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
  "search.suggest",
]

[project.theme.icon]
logo = "lucide/sparkles"

# Light/dark palettes with a manual toggle.
[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"
