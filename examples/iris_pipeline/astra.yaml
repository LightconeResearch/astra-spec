id: iris_pipeline
version: "0.1.0"
name: Iris Two-Stage Classification
narrative: |
  # Summary

  A two-stage pipeline for Iris classification that demonstrates
  sub-analyses. A feature-extraction stage learns a compact
  representation of the raw features (PCA or MLP encoder), whose
  output feeds into a separate classification stage.

  # Methods

  The [feature_extraction sub-analysis](#analyses.feature_extraction)
  produces encoded features, which feed
  [classification](#analyses.classification) via sibling-output
  wiring. A [test_split](#decisions.test_split) decision controls
  the holdout proportion and [random_seed](#decisions.random_seed)
  fixes reproducibility across both stages.

  # Inputs

  The [iris_data](#inputs.iris_data) input is Fisher's 150-sample,
  4-feature, 3-class dataset loaded from scikit-learn.

  # Outputs

  The top level exposes [accuracy](#outputs.accuracy) (from the
  classifier), a [feature_plot](#outputs.feature_plot) (from the
  extractor), and a [pipeline_summary](#outputs.pipeline_summary)
  report that compares methods end-to-end.
authors:
  - ASTRA Examples
tags:
  - classification
  - sub-analyses
  - sklearn
  - example

inputs:
  - id: iris_data
    type: data
    source: "sklearn.datasets.load_iris"
    description: "Fisher's classic 150-sample, 4-feature, 3-class dataset"

outputs:
  - id: accuracy
    from: classification.accuracy

  - id: feature_plot
    from: feature_extraction.feature_plot

  - id: pipeline_summary
    type: report
    description: End-to-end comparison of feature extraction methods
    recipe:
      command: python src/summarize.py

decisions:
  test_split:
    label: Test Set Proportion
    rationale: Trade-off between training data and evaluation reliability
    default: twenty_pct
    options:
      twenty_pct:
        label: "20%"
        description: 80/20 train-test split
      thirty_pct:
        label: "30%"
        description: 70/30 train-test split

  random_seed:
    label: Random Seed
    rationale: Controls reproducibility of splits and model initialization
    default: seed_42
    options:
      seed_42:
        label: "42"
      seed_7:
        label: "7"

analyses:
  feature_extraction:
    id: feature_extraction
    narrative: |
      # Summary

      Learn a low-dimensional representation of the 4 Iris features.
      PCA provides a linear, deterministic baseline; the MLP encoder
      trains a small autoencoder (4-8-k-8-4) and keeps the bottleneck
      layer as the representation.

      # Methods

      [method](#decisions.method) selects PCA or the MLP encoder;
      [n_components](#decisions.n_components) sets the target
      dimensionality. The [seed](#decisions.seed) decision is
      inherited from the parent's random_seed.

      # Inputs

      [raw_features](#inputs.raw_features) is the 4-dimensional
      Iris feature matrix inherited from the parent's iris_data.

      # Outputs

      Emits the transformed [features](#outputs.features) matrix
      and a [feature_plot](#outputs.feature_plot) scatter.

    inputs:
      - id: raw_features
        from: ../iris_data

    outputs:
      - id: features
        type: data
        description: Transformed feature matrix (n_samples x n_components)
        decisions: [method, n_components, seed]
        recipe:
          command: python src/extract_features.py

      - id: feature_plot
        type: figure
        description: Scatter plot of extracted features
        inputs: [features]
        decisions: [method, n_components]
        recipe:
          command: python src/plot_features.py

    decisions:
      seed:
        from: ../random_seed

      method:
        label: Extraction Method
        rationale: PCA is interpretable and deterministic; MLP encoder may capture nonlinear structure
        default: pca
        options:
          pca:
            label: PCA
            description: Principal Component Analysis
          mlp_encoder:
            label: MLP Encoder
            description: Bottleneck layer of a small autoencoder (4-8-k-8-4)
            incompatible_with:
              - n_components.three

      n_components:
        label: Number of Components
        rationale: Dimensionality of the learned representation
        default: two
        options:
          two:
            label: 2 components
            description: Aggressive reduction, easy to visualize
          three:
            label: 3 components
            description: Retains more variance but bottleneck is nearly input-sized for the encoder

  classification:
    id: classification
    narrative: |
      # Summary

      Train a classifier on the extracted features and evaluate
      accuracy on the held-out test set.

      # Methods

      [classifier](#decisions.classifier) selects the algorithm
      (logistic regression, SVM, or k-NN). The [split](#decisions.split)
      decision is inherited from the parent's test_split.

      # Inputs

      [features](#inputs.features) are the transformed features
      produced by the feature_extraction stage.

      # Outputs

      Emits [predictions](#outputs.predictions) on the test set and
      an [accuracy](#outputs.accuracy) metric.

    inputs:
      - id: features
        from: ../feature_extraction.features

    outputs:
      - id: predictions
        type: data
        description: Predicted class labels for the test set
        decisions: [classifier, split]
        recipe:
          command: python src/classify.py

      - id: accuracy
        type: metric
        description: Classification accuracy on held-out test set
        inputs: [predictions]
        decisions: [classifier, split]
        recipe:
          command: python src/evaluate.py

    decisions:
      split:
        from: ../test_split

      classifier:
        label: Classifier
        rationale: Logistic regression is a strong linear baseline; SVM adds a nonlinear kernel
        default: logistic
        options:
          logistic:
            label: Logistic Regression
            description: Multinomial logistic regression with L2 penalty
          svm:
            label: SVM (RBF)
            description: Support vector machine with radial basis function kernel
          knn:
            label: k-Nearest Neighbors
            description: k=5 nearest neighbors in the extracted feature space
