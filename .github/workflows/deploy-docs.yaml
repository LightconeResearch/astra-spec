---
name: Deploy docs
# Disabled: docs are now deployed via Cloudflare Pages
# on:  # yamllint disable-line rule:truthy
#   push:
#     branches: [main]
#   workflow_dispatch:
on: workflow_dispatch  # yamllint disable-line rule:truthy

permissions: {}

jobs:
  build-docs:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        pyversion: ["3.13"]

    # Grant GITHUB_TOKEN the permissions required to make a gh-pages deployment
    permissions:
      contents: write  # to let ghp-import push the gh-pages branch
      pages: write     # to deploy to Pages
      id-token: write  # allow to generate an OpenID Connect (OIDC) token

    steps:
      # https://github.com/actions/checkout
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # otherwise, you will fail to push refs to dest repo

      - name: Configure git for the bot
        # Gives the bot that commits to gh-pages a name & email address
        # so that the commits have an author in the commit log.
        run: |
          git config user.name github-actions[bot]
          git config user.email github-actions[bot]@users.noreply.github.com

      # https://github.com/astral-sh/setup-uv
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: ${{ matrix.pyversion }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      # https://github.com/actions/setup-python
      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.pyversion }}

      - name: Install just
        run: |
          uv tool install rust-just

      - name: Install dependencies
        run: uv sync --group dev --group docs --no-progress

      - name: Build documentation
        run: |
          just gen-doc
          uv run zensical build

      - name: Publish to gh-pages branch
        run: uv run ghp-import --no-jekyll --push --force site/
