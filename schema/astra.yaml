name: ASTRA
description: 'Agentic Schema for Transparent Research Analysis.

  A framework for defining hierarchical scientific analyses with

  decision points, evidence-backed insights, and universe specifications.'
title: ASTRA
see_also:
- https://LightconeResearch.github.io/ASTRA
- https://astra-spec.org
id: https://w3id.org/LightconeResearch/ASTRA
imports:
- linkml:types
- insight
- analysis
- universe
license: Apache-2.0
prefixes:
  astra:
    prefix_prefix: astra
    prefix_reference: https://w3id.org/LightconeResearch/ASTRA/
  linkml:
    prefix_prefix: linkml
    prefix_reference: https://w3id.org/linkml/
  oa:
    prefix_prefix: oa
    prefix_reference: http://www.w3.org/ns/oa#
default_prefix: astra
default_range: string
types:
  string:
    name: string
    definition_uri: https://w3id.org/linkml/String
    description: A character string
    notes:
    - In RDF serializations, a slot with range of string is treated as a literal or
      type xsd:string.   If you are authoring schemas in LinkML YAML, the type is
      referenced with the lower case "string".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Text
    base: str
    uri: xsd:string
  integer:
    name: integer
    definition_uri: https://w3id.org/linkml/Integer
    description: An integer
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "integer".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Integer
    base: int
    uri: xsd:integer
  boolean:
    name: boolean
    definition_uri: https://w3id.org/linkml/Boolean
    description: A binary (true or false) value
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "boolean".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Boolean
    base: Bool
    uri: xsd:boolean
    repr: bool
  float:
    name: float
    definition_uri: https://w3id.org/linkml/Float
    description: A real number that conforms to the xsd:float specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "float".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Float
    base: float
    uri: xsd:float
  double:
    name: double
    definition_uri: https://w3id.org/linkml/Double
    description: A real number that conforms to the xsd:double specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "double".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    close_mappings:
    - schema:Float
    base: float
    uri: xsd:double
  decimal:
    name: decimal
    definition_uri: https://w3id.org/linkml/Decimal
    description: A real number with arbitrary precision that conforms to the xsd:decimal
      specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "decimal".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    broad_mappings:
    - schema:Number
    base: Decimal
    uri: xsd:decimal
  time:
    name: time
    definition_uri: https://w3id.org/linkml/Time
    description: A time object represents a (local) time of day, independent of any
      particular day
    notes:
    - URI is dateTime because OWL reasoners do not work with straight date or time
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "time".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Time
    base: XSDTime
    uri: xsd:time
    repr: str
  date:
    name: date
    definition_uri: https://w3id.org/linkml/Date
    description: a date (year, month and day) in an idealized calendar
    notes:
    - URI is dateTime because OWL reasoners don't work with straight date or time
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "date".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Date
    base: XSDDate
    uri: xsd:date
    repr: str
  datetime:
    name: datetime
    definition_uri: https://w3id.org/linkml/Datetime
    description: The combination of a date and time
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "datetime".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:DateTime
    base: XSDDateTime
    uri: xsd:dateTime
    repr: str
  date_or_datetime:
    name: date_or_datetime
    definition_uri: https://w3id.org/linkml/DateOrDatetime
    description: Either a date or a datetime
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "date_or_datetime".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: linkml:DateOrDatetime
    repr: str
  uriorcurie:
    name: uriorcurie
    definition_uri: https://w3id.org/linkml/Uriorcurie
    description: a URI or a CURIE
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "uriorcurie".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: URIorCURIE
    uri: xsd:anyURI
    repr: str
  curie:
    name: curie
    definition_uri: https://w3id.org/linkml/Curie
    conforms_to: https://www.w3.org/TR/curie/
    description: a compact URI
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "curie".
    comments:
    - in RDF serializations this MUST be expanded to a URI
    - in non-RDF serializations MAY be serialized as the compact representation
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: Curie
    uri: xsd:string
    repr: str
  uri:
    name: uri
    definition_uri: https://w3id.org/linkml/Uri
    conforms_to: https://www.ietf.org/rfc/rfc3987.txt
    description: a complete URI
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "uri".
    comments:
    - in RDF serializations a slot with range of uri is treated as a literal or type
      xsd:anyURI unless it is an identifier or a reference to an identifier, in which
      case it is translated directly to a node
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    close_mappings:
    - schema:URL
    base: URI
    uri: xsd:anyURI
    repr: str
  ncname:
    name: ncname
    definition_uri: https://w3id.org/linkml/Ncname
    description: Prefix part of CURIE
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "ncname".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: NCName
    uri: xsd:string
    repr: str
  objectidentifier:
    name: objectidentifier
    definition_uri: https://w3id.org/linkml/Objectidentifier
    description: A URI or CURIE that represents an object in the model.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "objectidentifier".
    comments:
    - Used for inheritance and type checking
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: ElementIdentifier
    uri: shex:iri
    repr: str
  nodeidentifier:
    name: nodeidentifier
    definition_uri: https://w3id.org/linkml/Nodeidentifier
    description: A URI, CURIE or BNODE that represents a node in a model.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "nodeidentifier".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: NodeIdentifier
    uri: shex:nonLiteral
    repr: str
  jsonpointer:
    name: jsonpointer
    definition_uri: https://w3id.org/linkml/Jsonpointer
    conforms_to: https://datatracker.ietf.org/doc/html/rfc6901
    description: A string encoding a JSON Pointer. The value of the string MUST conform
      to JSON Point syntax and SHOULD dereference to a valid object within the current
      instance document when encoded in tree form.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "jsonpointer".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
  jsonpath:
    name: jsonpath
    definition_uri: https://w3id.org/linkml/Jsonpath
    conforms_to: https://www.ietf.org/archive/id/draft-goessner-dispatch-jsonpath-00.html
    description: A string encoding a JSON Path. The value of the string MUST conform
      to JSON Point syntax and SHOULD dereference to zero or more valid objects within
      the current instance document when encoded in tree form.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "jsonpath".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
  sparqlpath:
    name: sparqlpath
    definition_uri: https://w3id.org/linkml/Sparqlpath
    conforms_to: https://www.w3.org/TR/sparql11-query/#propertypaths
    description: A string encoding a SPARQL Property Path. The value of the string
      MUST conform to SPARQL syntax and SHOULD dereference to zero or more valid objects
      within the current instance document when encoded as RDF.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "sparqlpath".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
enums:
  InputType:
    name: InputType
    definition_uri: https://w3id.org/LightconeResearch/ASTRA/InputType
    description: Type of analysis input
    from_schema: https://w3id.org/LightconeResearch/ASTRA/analysis
    permissible_values:
      data:
        text: data
        description: A dataset, file, or external resource
      analysis:
        text: analysis
        description: Outputs from another ASTRA analysis
  OutputType:
    name: OutputType
    definition_uri: https://w3id.org/LightconeResearch/ASTRA/OutputType
    description: Type of analysis output
    from_schema: https://w3id.org/LightconeResearch/ASTRA/analysis
    permissible_values:
      metric:
        text: metric
        description: A metric or measurement
      figure:
        text: figure
        description: A figure or visualization
      table:
        text: table
        description: A table of data
      data:
        text: data
        description: A data file or dataset
      report:
        text: report
        description: A report or document
slots:
  from_ref:
    name: from_ref
    definition_uri: https://w3id.org/LightconeResearch/ASTRA/from_ref
    description: Reference to a parent or sibling element. Corresponds to 'from' in
      ASTRA YAML format.
    from_schema: https://w3id.org/LightconeResearch/ASTRA/analysis
    aliases:
    - from
    slot_uri: astra:from_ref
    owner: Decision
    domain_of:
    - Input
    - Output
    - Decision
    range: string
  when:
    name: when
    definition_uri: https://w3id.org/LightconeResearch/ASTRA/when
    description: 'Conditions for when this element is active. Format: ''decision_id.option_id''
      or ''~decision_id.option_id''. Multiple conditions are AND''d together.'
    from_schema: https://w3id.org/LightconeResearch/ASTRA/analysis
    slot_uri: astra:when
    owner: Decision
    domain_of:
    - Output
    - Decision
    range: string
    multivalued: true
  textQuoteSelector__exact:
    name: textQuoteSelector__exact
    description: Exact quoted text (1-3 sentences)
    from_schema: https://w3id.org/LightconeResearch/ASTRA/insight
    slot_uri: astra:exact
    alias: exact
    owner: TextQuoteSelector
    domain_of:
    - TextQuoteSelector
    range: string
    required: true
  textQuoteSelector__prefix:
    name: textQuoteSelector__prefix
    description: ~20-100 chars before for disambiguation
    from_schema: https://w3id.org/LightconeResearch/ASTRA/insight
    slot_uri: astra:prefix
    alias: prefix
    owner: TextQuoteSelector
    domain_of:
    - TextQuoteSelector
    range: string
  textQuoteSelector__suffix:
    name: textQuoteSelector__suffix
    description: ~20-100 chars after for disambiguation
    from_schema: https://w3id.org/LightconeResearch/ASTRA/insight
    slot_uri: astra:suffix
    alias: suffix
    owner: TextQuoteSelector
    domain_of:
    - TextQuoteSelector
    range: string
  fragmentSelector__value:
    name: fragmentSelector__value
    description: Fragment value (e.g., 'page=6')
    from_schema: https://w3id.org/LightconeResearch/ASTRA/insight
    slot_uri: astra:value
    alias: value
    owner: FragmentSelector
    domain_of:
    - FragmentSelector
    range: string
  fragmentSelector__page:
    name: fragmentSelector__page
    description: 1-indexed page number
    from_schema: https://w3id.org/LightconeResearch/ASTRA/insight
    slot_uri: astra:page
    alias: page
    owner: FragmentSelector
    domain_of:
    - FragmentSelector
    range: integer
    minimum_value: 1
  evidence__id:
    name: evidence__id
    description: Evidence identifier
    from_schema: https://w3id.org/LightconeResearch/ASTRA/insight
    slot_uri: astra:id
    identifier: true
    alias: id
    owner: Evidence
    domain_of:
    - Evidence
    range: string
    required: true
  evidence__doi:
    name: evidence__doi
    description: DOI of the source paper (e.g., '10.48550/arXiv.1706.03762')
    from_schema: https://w3id.org/LightconeResearch/ASTRA/insight
    slot_uri: astra:doi
    alias: doi
    owner: Evidence
    domain_of:
    - Evidence
    range: string
    pattern: ^10\.\d{4,}/.*$
  evidence__artifact:
    name: evidence__artifact
    description: Output ID referencing a declared output in this analysis
    from_schema: https://w3id.org/LightconeResearch/ASTRA/insight
    slot_uri: astra:artifact
    alias: artifact
    owner: Evidence
    domain_of:
    - Evidence
    range: string
  evidence__version:
    name: evidence__version
    description: Paper version for arXiv papers (version matters for reproducibility)
    from_schema: https://w3id.org/LightconeResearch/ASTRA/insight
    slot_uri: astra:version
    alias: version
    owner: Evidence
    domain_of:
    - Evidence
    range: integer
    minimum_value: 1
  evidence__snapshot:
    name: evidence__snapshot
    description: Path to immutable copy of the artifact
    from_schema: https://w3id.org/LightconeResearch/ASTRA/insight
    slot_uri: astra:snapshot
    alias: snapshot
    owner: Evidence
    domain_of:
    - Evidence
    range: string
  evidence__source_commit:
    name: evidence__source_commit
    description: Git commit that produced the original artifact
    from_schema: https://w3id.org/LightconeResearch/ASTRA/insight
    slot_uri: astra:source_commit
    alias: source_commit
    owner: Evidence
    domain_of:
    - Evidence
    range: string
  evidence__quote:
    name: evidence__quote
    description: Text quote anchor
    from_schema: https://w3id.org/LightconeResearch/ASTRA/insight
    slot_uri: astra:quote
    alias: quote
    owner: Evidence
    domain_of:
    - Evidence
    range: TextQuoteSelector
    inlined: true
    inlined_as_list: true
  evidence__location:
    name: evidence__location
    description: Location hint (page number for PDFs/reports)
    from_schema: https://w3id.org/LightconeResearch/ASTRA/insight
    slot_uri: astra:location
    alias: location
    owner: Evidence
    domain_of:
    - Evidence
    range: FragmentSelector
    inlined: true
    inlined_as_list: true
  insight__id:
    name: insight__id
    description: Unique identifier
    from_schema: https://w3id.org/LightconeResearch/ASTRA/insight
    slot_uri: astra:id
    identifier: true
    alias: id
    owner: Insight
    domain_of:
    - Insight
    range: string
    required: true
  insight__claim:
    name: insight__claim
    description: What we learned (1-2 sentences)
    from_schema: https://w3id.org/LightconeResearch/ASTRA/insight
    slot_uri: astra:claim
    alias: claim
    owner: Insight
    domain_of:
    - Insight
    range: string
    required: true
  insight__created_at:
    name: insight__created_at
    description: Creation timestamp (ISO 8601)
    from_schema: https://w3id.org/LightconeResearch/ASTRA/insight
    slot_uri: astra:created_at
    alias: created_at
    owner: Insight
    domain_of:
    - Insight
    range: datetime
    required: true
  insight__evidence:
    name: insight__evidence
    description: Supporting evidence (papers or analysis artifacts)
    from_schema: https://w3id.org/LightconeResearch/ASTRA/insight
    slot_uri: astra:evidence
    alias: evidence
    owner: Insight
    domain_of:
    - Insight
    range: Evidence
    required: true
    multivalued: true
    inlined: true
    inlined_as_list: true
  insight__derived:
    name: insight__derived
    description: True if synthesized/inferred from multiple sources
    from_schema: https://w3id.org/LightconeResearch/ASTRA/insight
    slot_uri: astra:derived
    alias: derived
    owner: Insight
    domain_of:
    - Insight
    range: boolean
  insight__scope:
    name: insight__scope
    description: Applicability conditions
    from_schema: https://w3id.org/LightconeResearch/ASTRA/insight
    slot_uri: astra:scope
    alias: scope
    owner: Insight
    domain_of:
    - Insight
    range: string
  insight__tags:
    name: insight__tags
    description: Categorization tags
    from_schema: https://w3id.org/LightconeResearch/ASTRA/insight
    slot_uri: astra:tags
    alias: tags
    owner: Insight
    domain_of:
    - Insight
    range: string
    multivalued: true
  insight__notes:
    name: insight__notes
    description: Reasoning notes
    from_schema: https://w3id.org/LightconeResearch/ASTRA/insight
    slot_uri: astra:notes
    alias: notes
    owner: Insight
    domain_of:
    - Insight
    range: string
  insightCollection__insights:
    name: insightCollection__insights
    description: Map of insight IDs to insights
    from_schema: https://w3id.org/LightconeResearch/ASTRA/insight
    slot_uri: astra:insights
    alias: insights
    owner: InsightCollection
    domain_of:
    - InsightCollection
    range: Insight
    multivalued: true
    inlined: true
    inlined_as_list: false
  keyValuePair__key:
    name: keyValuePair__key
    description: The key
    from_schema: https://w3id.org/LightconeResearch/ASTRA/analysis
    slot_uri: astra:key
    identifier: true
    alias: key
    owner: KeyValuePair
    domain_of:
    - KeyValuePair
    range: string
    required: true
  keyValuePair__value:
    name: keyValuePair__value
    description: The value
    from_schema: https://w3id.org/LightconeResearch/ASTRA/analysis
    slot_uri: astra:value
    alias: value
    owner: KeyValuePair
    domain_of:
    - KeyValuePair
    range: string
    required: true
  resources__cpus:
    name: resources__cpus
    description: Number of CPUs
    from_schema: https://w3id.org/LightconeResearch/ASTRA/analysis
    slot_uri: astra:cpus
    alias: cpus
    owner: Resources
    domain_of:
    - Resources
    range: integer
    minimum_value: 1
  resources__memory:
    name: resources__memory
    description: Memory requirement (e.g., '8GB', '512MB')
    from_schema: https://w3id.org/LightconeResearch/ASTRA/analysis
    slot_uri: astra:memory
    alias: memory
    owner: Resources
    domain_of:
    - Resources
    range: string
  resources__gpus:
    name: resources__gpus
    description: Number of GPUs
    from_schema: https://w3id.org/LightconeResearch/ASTRA/analysis
    slot_uri: astra:gpus
    alias: gpus
    owner: Resources
    domain_of:
    - Resources
    range: integer
    minimum_value: 1
  resources__time_limit:
    name: resources__time_limit
    description: Maximum wall time (e.g., '2h', '30m')
    from_schema: https://w3id.org/LightconeResearch/ASTRA/analysis
    slot_uri: astra:time_limit
    alias: time_limit
    owner: Resources
    domain_of:
    - Resources
    range: string
  containerBuildSpec__build:
    name: containerBuildSpec__build
    description: Path to Containerfile relative to project root
    from_schema: https://w3id.org/LightconeResearch/ASTRA/analysis
    slot_uri: astra:build
    alias: build
    owner: ContainerBuildSpec
    domain_of:
    - ContainerBuildSpec
    range: string
    required: true
  containerBuildSpec__context:
    name: containerBuildSpec__context
    description: Build context directory
    from_schema: https://w3id.org/LightconeResearch/ASTRA/analysis
    slot_uri: astra:context
    alias: context
    owner: ContainerBuildSpec
    domain_of:
    - ContainerBuildSpec
    range: string
  containerBuildSpec__args:
    name: containerBuildSpec__args
    description: Docker build arguments as key-value pairs
    from_schema: https://w3id.org/LightconeResearch/ASTRA/analysis
    slot_uri: astra:args
    alias: args
    owner: ContainerBuildSpec
    domain_of:
    - ContainerBuildSpec
    range: KeyValuePair
    multivalued: true
    inlined: true
    inlined_as_list: true
  recipe__command:
    name: recipe__command
    description: Command to execute (e.g., 'python src/train.py')
    from_schema: https://w3id.org/LightconeResearch/ASTRA/analysis
    slot_uri: astra:command
    alias: command
    owner: Recipe
    domain_of:
    - Recipe
    range: string
    required: true
  recipe__inputs:
    name: recipe__inputs
    description: Output IDs that must be materialized before this recipe runs
    from_schema: https://w3id.org/LightconeResearch/ASTRA/analysis
    slot_uri: astra:inputs
    alias: inputs
    owner: Recipe
    domain_of:
    - Recipe
    range: string
    multivalued: true
  recipe__container:
    name: recipe__container
    description: Container image name (pre-built image string)
    from_schema: https://w3id.org/LightconeResearch/ASTRA/analysis
    slot_uri: astra:container
    alias: container
    owner: Recipe
    domain_of:
    - Recipe
    range: string
  recipe__container_build:
    name: recipe__container_build
    description: Container image build specification (alternative to container string)
    from_schema: https://w3id.org/LightconeResearch/ASTRA/analysis
    slot_uri: astra:container_build
    alias: container_build
    owner: Recipe
    domain_of:
    - Recipe
    range: ContainerBuildSpec
    inlined: true
    inlined_as_list: true
  recipe__resources:
    name: recipe__resources
    description: Compute resource requirements
    from_schema: https://w3id.org/LightconeResearch/ASTRA/analysis
    slot_uri: astra:resources
    alias: resources
    owner: Recipe
    domain_of:
    - Recipe
    range: Resources
    inlined: true
    inlined_as_list: true
  input__id:
    name: input__id
    description: Unique identifier for the input
    from_schema: https://w3id.org/LightconeResearch/ASTRA/analysis
    slot_uri: astra:id
    identifier: true
    alias: id
    owner: Input
    domain_of:
    - Input
    range: string
    required: true
    pattern: ^[a-z][a-z0-9_]*$
  input__type:
    name: input__type
    description: Type of input
    from_schema: https://w3id.org/LightconeResearch/ASTRA/analysis
    slot_uri: astra:type
    alias: type
    owner: Input
    domain_of:
    - Input
    range: InputType
    required: true
  input__description:
    name: input__description
    description: Description of the input
    from_schema: https://w3id.org/LightconeResearch/ASTRA/analysis
    slot_uri: astra:description
    alias: description
    owner: Input
    domain_of:
    - Input
    range: string
  input__source:
    name: input__source
    description: URI or path to the data source
