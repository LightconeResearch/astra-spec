classes:
  TextQuoteSelector:
    name: TextQuoteSelector
    definition_uri: https://w3id.org/LightconeResearch/ASTRA/TextQuoteSelector
    description: W3C TextQuoteSelector for locating text in a document. The authoritative
      anchor for verification.
    from_schema: https://w3id.org/LightconeResearch/ASTRA/insight
    mappings:
    - oa:TextQuoteSelector
    slots:
    - textQuoteSelector__exact
    - textQuoteSelector__prefix
    - textQuoteSelector__suffix
    attributes:
      exact:
        name: exact
        description: Exact quoted text (1-3 sentences)
        required: true
      prefix:
        name: prefix
        description: ~20-100 chars before for disambiguation
      suffix:
        name: suffix
        description: ~20-100 chars after for disambiguation
    class_uri: oa:TextQuoteSelector
  FragmentSelector:
    name: FragmentSelector
    definition_uri: https://w3id.org/LightconeResearch/ASTRA/FragmentSelector
    description: W3C FragmentSelector for PDF locations. Conforms to RFC 3778/8118
      for PDF fragments.
    from_schema: https://w3id.org/LightconeResearch/ASTRA/insight
    mappings:
    - oa:FragmentSelector
    slots:
    - fragmentSelector__value
    - fragmentSelector__page
    attributes:
      value:
        name: value
        description: Fragment value (e.g., 'page=6')
      page:
        name: page
        description: 1-indexed page number
        range: integer
        minimum_value: 1
    class_uri: oa:FragmentSelector
  Evidence:
    name: Evidence
    definition_uri: https://w3id.org/LightconeResearch/ASTRA/Evidence
    description: Evidence from a source with W3C-compliant selectors. Can reference
      literature (by DOI) or analysis artifacts (by output ID). Exactly one of doi
      or artifact must be set.
    from_schema: https://w3id.org/LightconeResearch/ASTRA/insight
    slots:
    - evidence__id
    - evidence__doi
    - evidence__artifact
    - evidence__version
    - evidence__snapshot
    - evidence__source_commit
    - evidence__quote
    - evidence__location
    attributes:
      id:
        name: id
        description: Evidence identifier
        identifier: true
      doi:
        name: doi
        description: DOI of the source paper (e.g., '10.48550/arXiv.1706.03762')
        pattern: ^10\.\d{4,}/.*$
      artifact:
        name: artifact
        description: Output ID referencing a declared output in this analysis
      version:
        name: version
        description: Paper version for arXiv papers (version matters for reproducibility)
        range: integer
        minimum_value: 1
      snapshot:
        name: snapshot
        description: Path to immutable copy of the artifact
      source_commit:
        name: source_commit
        description: Git commit that produced the original artifact
      quote:
        name: quote
        description: Text quote anchor
        range: TextQuoteSelector
        inlined: true
      location:
        name: location
        description: Location hint (page number for PDFs/reports)
        range: FragmentSelector
        inlined: true
    class_uri: astra:Evidence
  Insight:
    name: Insight
    definition_uri: https://w3id.org/LightconeResearch/ASTRA/Insight
    description: A unit of scientific knowledge backed by evidence. Used for both
      prior_insights (informing decisions) and findings (conclusions from the analysis).
    from_schema: https://w3id.org/LightconeResearch/ASTRA/insight
    slots:
    - insight__id
    - insight__claim
    - insight__created_at
    - insight__evidence
    - insight__derived
    - insight__scope
    - insight__tags
    - insight__notes
    attributes:
      id:
        name: id
        description: Unique identifier
        identifier: true
      claim:
        name: claim
        description: What we learned (1-2 sentences)
        required: true
      created_at:
        name: created_at
        description: Creation timestamp (ISO 8601)
        range: datetime
        required: true
      evidence:
        name: evidence
        description: Supporting evidence (papers or analysis artifacts)
        range: Evidence
        required: true
        multivalued: true
        inlined_as_list: true
      derived:
        name: derived
        description: True if synthesized/inferred from multiple sources
        range: boolean
      scope:
        name: scope
        description: Applicability conditions
      tags:
        name: tags
        description: Categorization tags
        multivalued: true
      notes:
        name: notes
        description: Reasoning notes
    class_uri: astra:Insight
  InsightCollection:
    name: InsightCollection
    definition_uri: https://w3id.org/LightconeResearch/ASTRA/InsightCollection
    description: Collection of insights, usable standalone or embedded in an analysis
    from_schema: https://w3id.org/LightconeResearch/ASTRA/insight
    slots:
    - insightCollection__insights
    attributes:
      insights:
        name: insights
        description: Map of insight IDs to insights
        range: Insight
        multivalued: true
        inlined: true
    class_uri: astra:InsightCollection
  KeyValuePair:
    name: KeyValuePair
    definition_uri: https://w3id.org/LightconeResearch/ASTRA/KeyValuePair
    description: A key-value string pair
    from_schema: https://w3id.org/LightconeResearch/ASTRA/analysis
    slots:
    - keyValuePair__key
    - keyValuePair__value
    attributes:
      key:
        name: key
        description: The key
        identifier: true
      value:
        name: value
        description: The value
        required: true
    class_uri: astra:KeyValuePair
  Resources:
    name: Resources
    definition_uri: https://w3id.org/LightconeResearch/ASTRA/Resources
    description: Compute resource requirements for a recipe
    from_schema: https://w3id.org/LightconeResearch/ASTRA/analysis
    slots:
    - resources__cpus
    - resources__memory
    - resources__gpus
    - resources__time_limit
    attributes:
      cpus:
        name: cpus
        description: Number of CPUs
        range: integer
        minimum_value: 1
      memory:
        name: memory
        description: Memory requirement (e.g., '8GB', '512MB')
      gpus:
        name: gpus
        description: Number of GPUs
        range: integer
        minimum_value: 1
      time_limit:
        name: time_limit
        description: Maximum wall time (e.g., '2h', '30m')
    class_uri: astra:Resources
  ContainerBuildSpec:
    name: ContainerBuildSpec
    definition_uri: https://w3id.org/LightconeResearch/ASTRA/ContainerBuildSpec
    description: Specification for building a container image from a Containerfile
    from_schema: https://w3id.org/LightconeResearch/ASTRA/analysis
    slots:
    - containerBuildSpec__build
    - containerBuildSpec__context
    - containerBuildSpec__args
    attributes:
      build:
        name: build
        description: Path to Containerfile relative to project root
        required: true
      context:
        name: context
        description: Build context directory
      args:
        name: args
        description: Docker build arguments as key-value pairs
        range: KeyValuePair
        multivalued: true
        inlined_as_list: true
    class_uri: astra:ContainerBuildSpec
  Recipe:
    name: Recipe
    definition_uri: https://w3id.org/LightconeResearch/ASTRA/Recipe
    description: 'A build rule that produces an output. Recipes are the execution
      contract: run this command to produce the parent output.'
    from_schema: https://w3id.org/LightconeResearch/ASTRA/analysis
    slots:
    - recipe__command
    - recipe__inputs
    - recipe__container
    - recipe__container_build
    - recipe__resources
    attributes:
      command:
        name: command
        description: Command to execute (e.g., 'python src/train.py')
        required: true
      inputs:
        name: inputs
        description: Output IDs that must be materialized before this recipe runs
        multivalued: true
      container:
        name: container
        description: Container image name (pre-built image string)
      container_build:
        name: container_build
        description: Container image build specification (alternative to container
          string)
        range: ContainerBuildSpec
        inlined: true
      resources:
        name: resources
        description: Compute resource requirements
        range: Resources
        inlined: true
    class_uri: astra:Recipe
  Input:
    name: Input
    definition_uri: https://w3id.org/LightconeResearch/ASTRA/Input
    description: 'An input to the analysis. Two kinds: data (dataset/file/resource)
      or analysis (outputs from another ASTRA analysis). Sub-analysis inputs can use
      from_ref to reference a parent input or a sibling''s output (e.g., ''sibling_id.output_id'').'
